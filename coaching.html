<style>

body {
  margin: 0;
  background: #0b0b0b;
  color: #eaeaea;
  font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
  line-height: 1.7;
}

/* コンテナ */
.container {
  max-width: 720px;
  margin: 40px auto;
  padding: 0 24px;
  position: relative;
}

/* HERO */
.hero {
  display: flex;
  align-items: center;
  gap: 60px;
}

/* テキスト */
.hero-text {
  flex: 1;
  z-index: 2;
}

/* 画像 */
.hero-image {
  width: 320px;
  height: 420px;
  overflow: hidden;
  border-radius: 200px 200px 0 200px;
  flex-shrink: 0;
  margin-left: -60px; /* ← 文字に寄せる */
}

.hero-image img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: top; /* 顔守る */
}

/* タイトル */
h1 {
  font-size: 40px;
  font-weight: 500;
  letter-spacing: -0.5px;
  margin-bottom: 16px;
  margin-top: 0;
}

.subtitle {
  font-size: 18px;
  opacity: 0.7;
  margin-bottom: 80px;
}

/* セクション */
.section {
  margin-bottom: 100px;
}

/* 見出し */
h2 {
  font-size: 18px;
  font-weight: 500;
  margin-bottom: 20px;
  letter-spacing: 1px;
  text-transform: uppercase;
  opacity: 0.6;
}

/* テキスト */
p {
  font-size: 16px;
  opacity: 0.85;
  margin-bottom: 18px;
}

/* リスト */
ul {
  padding-left: 18px;
}

li {
  margin-bottom: 12px;
  opacity: 0.9;
}

/* 価格 */
.price {
  font-size: 26px;
  margin: 10px 0 30px;
}

/* ボタン */
.button {
  display: inline-block;
  padding: 16px 34px;
  background: white;
  color: black;
  text-decoration: none;
  font-weight: 500;
  transition: 0.25s;
}

.button:hover {
  opacity: 0.8;
}

/* カード */
.card {
  border: 1px solid rgba(255,255,255,0.08);
  padding: 24px;
  margin-bottom: 20px;
}

.name {
  font-size: 13px;
  opacity: 0.5;
  margin-top: 12px;
}

/* =========================
   🔴 モバイル完全修正
========================= */
@media (max-width: 768px) {

  .hero {
    flex-direction: column;
    gap: 16px;
  }

  .hero-text {
    width: 100%;
  }

  .hero-image {
    width: 100%;
    height: 260px; /* ← 下だけカット */
    border-radius: 160px 160px 0 0;
    margin-top: -80px; /* ← 文字と自然に重ねる */
    margin-left: 0;
  }

  h1 {
    font-size: 26px;
    line-height: 1.2;
  }

  .subtitle {
    font-size: 14px;
    line-height: 1.5;
    margin-bottom: 40px;
  }

  .container {
    padding: 0 16px;
  }

}

</style>
